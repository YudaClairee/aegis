$schema: '../../.moon/cache/schemas/project.json'

project:
  type: 'application'
language: 'typescript'


fileGroups:
  sources:
    - 'app/**/*'
    - 'src/**/*'
  configs:
    - 'app.json'
    - 'tsconfig.json'
    - 'tailwind.config.js'
    - 'metro.config.js'

tasks:
  start:
    command: 'npx expo start --clear'
    preset: 'server'

  start-dev:
    command: 'npx expo start --dev-client --clear'
    preset: 'server'

  build-android:
    command: 'eas build --platform android --profile preview'
    options:
      cache: false
      runInCI: false

  build-android-apk:
    command: 'eas build --platform android --profile production'
    options:
      cache: false
      runInCI: false

  prebuild:
    command: 'npx expo prebuild --clean'
    options:
      cache: false
      runInCI: false

  lint:
    command: 'npx expo lint'
    inputs:
      - '@self:sources'

  typecheck:
    command: 'npx tsc --noEmit'
    inputs:
      - '@self:sources'
      - '@self:configs'
